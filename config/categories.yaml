# ASAN Appeal Official Categories
# Based on ASAN's 7 official categories for citizen appeals
#
# Override with CATEGORIES_CONFIG env var if needed:
#   CATEGORIES_CONFIG=config/categories_custom.yaml uvicorn app.main:app
#
version: 5

categories:
  - id: utilities
    label: Utilities
    label_az: Kommunal

  - id: road_problems
    label: Road problems
    label_az: Yol problemləri

  - id: transport_problems
    label: Transport problems
    label_az: Nəqliyyat problemləri

  - id: infrastructure_repair
    label: Infrastructure repair
    label_az: İnfrastrukturun təmiri

  - id: infrastructure_improvement
    label: Infrastructure improvement
    label_az: İnfrastrukturun abadlaşdırılması

  - id: infrastructure_cleanliness
    label: Infrastructure cleanliness
    label_az: İnfrastrukturun təmizliyi

  - id: other
    label: Other
    label_az: Digər
