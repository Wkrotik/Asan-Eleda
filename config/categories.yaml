    label: Utilities
    label_az: Kommunal
    synonyms:
      # Water issues
      - water leak
      - water main leak
      - burst water pipe
      - water pipe break
      - water spraying from ground
      - leaking pipe
      - water supply problem
      - no water supply
      # Gas issues
      - gas leak
      - gas pipe problem
      - gas supply issue
      # Electricity issues
      - power outage
      - electrical problem
      - no electricity
      - electricity supply issue
      - exposed electrical wires
      - hanging cables
      - dangerous wires
      - electrical hazard
      - wires hanging down
      # Heating issues
      - heating problem
